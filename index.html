<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio de Desenvolvedor</title>
</head>

<body>
    <!-- Cabeçalho -->
    <header>
        <h1>Olá meu nome é Lucas e esse é meu portfólio de desenvolvedor</h1>
    </header>

    <!-- Seção sobre -->
    <section>
        <h2>Sobre mim</h2>
        <p>Sou um desenvolvedor apaixonado por tecnologia e inovação. Tenho experiência em <strong>HTML</strong> e <strong>Python</strong> e estou sempre buscando aprender mais para aprimorar minhas habilidades.</p>
    </section>

    <!-- Formulário de contato -->
    <main>
        <form>
            <!-- Dados de contato -->
            <fieldset>
                <legend>Contato</legend>

                <!-- Email -->
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Digite seu email" required>
                </div>

                <!-- Área de Interesse -->
                <div>
                    <label for="interesse">Área de interesse:</label>
                    <div>
                        <input type="radio" id="frontend" name="Área de interesse" value="Frontend">
                        <label for="frontend">Frontend</label>
                    </div>
                    <div>
                        <input type="radio" id="backend" name="Área de interesse" value="Backend">
                        <label for="backend">Backend</label>
                    </div>
                    <div>
                        <input type="radio" id="fullstack" name="Área de interesse" value="Fullstack">
                        <label for="fullstack">Fullstack</label>
                    </div>
                </div>

                <!-- Habilidades -->
                <div>
                    <label for="habilidades">Habilidades:</label>
                    <div>
                        <input type="checkbox" id="html" name="Habilidades" value="HTML">
                        <label for="html">HTML</label>
                    </div>
                    <div>
                        <input type="checkbox" id="c" name="Habilidades" value="C">
                        <label for="c">C</label>
                    </div>
                    <div>
                        <input type="checkbox" id="git" name="Habilidades" value="Git">
                        <label for="git">Git</label>
                    </div>
                    <div>
                        <input type="checkbox" id="redes" name="Habilidades" value="Redes">
                        <label for="redes">Redes</label>
                    </div>
                </div>
            </fieldset>

            <!-- Botão de envio -->
            <button type="submit">Enviar</button>
        </form>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; 2026 - <a href="https://github.com/LucasHarlequin" target="_blank">Meu GitHub</a></p>
    </footer>

</body>
</html>
